<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudentCRUD | Three-Tier App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --card:      #1a1a26;
      --border:    #2a2a3e;
      --accent:    #6c63ff;
      --accent2:   #ff6584;
      --green:     #43e97b;
      --text:      #e8e8f0;
      --muted:     #7a7a9a;
      --radius:    14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND GRID ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(108,99,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── GLOW BLOBS ── */
    .blob {
      position: fixed; border-radius: 50%; filter: blur(120px);
      pointer-events: none; z-index: 0; opacity: .35;
    }
    .blob-1 { width:500px;height:500px;background:#6c63ff;top:-150px;left:-100px; }
    .blob-2 { width:400px;height:400px;background:#ff6584;bottom:-100px;right:-80px; }

    /* ── LAYOUT ── */
    .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 32px 0 40px;
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .badge {
      background: rgba(108,99,255,.15); border: 1px solid rgba(108,99,255,.3);
      color: var(--accent); padding: 6px 14px; border-radius: 999px;
      font-size: .78rem; font-weight: 500; letter-spacing: .5px;
    }

    /* ── HERO ── */
    .hero { text-align: center; padding: 10px 0 50px; }
    .hero h1 {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(2.2rem, 5vw, 3.6rem); line-height: 1.1;
      letter-spacing: -1px; margin-bottom: 16px;
    }
    .hero h1 em { font-style: normal; color: var(--accent); }
    .hero p { color: var(--muted); font-size: 1.05rem; max-width: 500px; margin: 0 auto; }

    /* ── STATS ROW ── */
    .stats { display: flex; gap: 16px; justify-content: center; margin: 36px 0 50px; flex-wrap: wrap; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 30px; text-align: center;
      min-width: 130px;
    }
    .stat-card .val { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-card .lbl { font-size: .78rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; margin-bottom: 36px;
    }
    .form-card h2 {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem;
      margin-bottom: 24px; display: flex; align-items: center; gap: 10px;
    }
    .form-card h2 .dot { width:10px;height:10px;border-radius:50%;background:var(--accent); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: .82rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
    .field input, .field select {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .95rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.15);
    }
    .field select option { background: var(--surface); }
    .btn-row { display: flex; gap: 12px; margin-top: 20px; }
    .btn {
      padding: 12px 28px; border-radius: 10px; font-family: 'DM Sans', sans-serif;
      font-weight: 500; font-size: .95rem; cursor: pointer; border: none;
      transition: all .2s; display: flex; align-items: center; gap: 8px;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #7c74ff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,99,255,.35); }
    .btn-outline { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent2); color: var(--accent2); }
    #edit-id-display { display:none; font-size:.82rem; color:var(--accent); margin-left:auto; align-self:center; }

    /* ── TABLE ── */
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .table-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 28px; border-bottom: 1px solid var(--border);
    }
    .table-header h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; }
    #search-input {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 16px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: .9rem; outline: none; width: 220px;
      transition: border-color .2s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; padding: 14px 24px;
      font-size: .75rem; text-transform: uppercase; letter-spacing: .6px;
      color: var(--muted); font-weight: 500;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(108,99,255,.05); }
    tbody td { padding: 15px 24px; font-size: .93rem; vertical-align: middle; }

    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem; margin-right: 10px;
      flex-shrink: 0;
    }
    .name-cell { display: flex; align-items: center; }
    .course-pill {
      background: rgba(108,99,255,.12); border: 1px solid rgba(108,99,255,.2);
      color: #a09bff; padding: 3px 10px; border-radius: 999px; font-size: .78rem; font-weight: 500;
    }
    .action-btns { display: flex; gap: 8px; }
    .btn-sm {
      padding: 6px 14px; border-radius: 7px; font-size: .82rem;
      font-family: 'DM Sans', sans-serif; cursor: pointer; border: none;
      font-weight: 500; transition: all .15s;
    }
    .btn-edit { background: rgba(108,99,255,.15); color: var(--accent); }
    .btn-edit:hover { background: rgba(108,99,255,.3); }
    .btn-del { background: rgba(255,101,132,.12); color: var(--accent2); }
    .btn-del:hover { background: rgba(255,101,132,.28); }

    .empty-state { text-align: center; padding: 60px; color: var(--muted); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 30px; right: 30px; z-index: 9999;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 22px;
      font-size: .9rem; display: flex; align-items: center; gap: 10px;
      transform: translateY(120px); opacity: 0;
      transition: all .35s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-left: 3px solid var(--green); }
    #toast.error   { border-left: 3px solid var(--accent2); }

    @media(max-width:640px) {
      .form-grid { grid-template-columns: 1fr; }
      .table-header { flex-direction: column; gap: 12px; align-items: flex-start; }
      #search-input { width: 100%; }
      .hero h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="wrapper">
    <header>
      <div class="logo">Student<span>CRUD</span></div>
      <div class="badge">Three-Tier Web App</div>
    </header>

    <div class="hero">
      <h1>Manage Students<br/><em>Seamlessly</em></h1>
      <p>A full-stack CRUD application — Frontend · Node.js API · MySQL Database</p>
    </div>

    <div class="stats">
      <div class="stat-card"><div class="val" id="stat-total">0</div><div class="lbl">Total Students</div></div>
      <div class="stat-card"><div class="val" id="stat-courses">0</div><div class="lbl">Courses</div></div>
      <div class="stat-card"><div class="val" id="stat-avg-age">–</div><div class="lbl">Avg. Age</div></div>
    </div>

    <!-- FORM -->
    <div class="form-card">
      <h2><span class="dot"></span> <span id="form-title">Add New Student</span></h2>
      <div class="form-grid">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="f-name" placeholder="e.g. Ayush Sharma"/>
        </div>
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="f-email" placeholder="student@example.com"/>
        </div>
        <div class="field">
          <label>Course</label>
          <select id="f-course">
            <option value="">— Select Course —</option>
            <option>Computer Science</option>
            <option>Information Technology</option>
            <option>Electronics</option>
            <option>Mechanical Engineering</option>
            <option>Civil Engineering</option>
            <option>Data Science</option>
            <option>Artificial Intelligence</option>
          </select>
        </div>
        <div class="field">
          <label>Age</label>
          <input type="number" id="f-age" placeholder="e.g. 21" min="15" max="60"/>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="submitForm()">
          <span id="btn-label">➕ Add Student</span>
        </button>
        <button class="btn btn-outline" onclick="resetForm()">✕ Cancel</button>
        <span id="edit-id-display"></span>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-header">
        <h2>Student Records</h2>
        <input id="search-input" type="text" placeholder="🔍 Search by name or course…" oninput="filterTable(this.value)"/>
      </div>
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Email</th>
            <th>Course</th>
            <th>Age</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="5"><div class="empty-state"><div class="icon">📡</div>Connecting to backend…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ── CONFIG ──────────────────────────────────────────────────────────────────
    // Change this to your backend server IP/domain when deploying
    const API = '/api';

    let allStudents = [];
    let editingId = null;

    const AVATAR_COLORS = ['#6c63ff','#ff6584','#43e97b','#f7971e','#4facfe','#fa709a','#a18cd1'];

    // ── FETCH ALL ────────────────────────────────────────────────────────────────
    async function loadStudents() {
      try {
        const res = await fetch(`${API}/students`);
        allStudents = await res.json();
        renderTable(allStudents);
        updateStats(allStudents);
      } catch (e) {
        showToast('❌ Cannot reach backend server. Check configuration.', 'error');
        document.getElementById('table-body').innerHTML =
          `<tr><td colspan="5"><div class="empty-state"><div class="icon">⚠️</div>Backend unreachable. Is the server running?</div></td></tr>`;
      }
    }

    // ── STATS ────────────────────────────────────────────────────────────────────
    function updateStats(data) {
      document.getElementById('stat-total').textContent = data.length;
      const courses = new Set(data.map(s => s.course)).size;
      document.getElementById('stat-courses').textContent = courses;
      const avg = data.length ? Math.round(data.reduce((a, s) => a + s.age, 0) / data.length) : '–';
      document.getElementById('stat-avg-age').textContent = avg;
    }

    // ── RENDER TABLE ─────────────────────────────────────────────────────────────
    function renderTable(data) {
      const tbody = document.getElementById('table-body');
      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="icon">🎓</div>No students yet. Add one above!</div></td></tr>`;
        return;
      }
      tbody.innerHTML = data.map(s => {
        const initials = s.name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
        const color = AVATAR_COLORS[s.id % AVATAR_COLORS.length];
        return `<tr>
          <td><div class="name-cell">
            <div class="avatar" style="background:${color}20;color:${color}">${initials}</div>
            ${s.name}
          </div></td>
          <td style="color:var(--muted)">${s.email}</td>
          <td><span class="course-pill">${s.course}</span></td>
          <td>${s.age}</td>
          <td><div class="action-btns">
            <button class="btn-sm btn-edit" onclick="editStudent(${s.id})">✏️ Edit</button>
            <button class="btn-sm btn-del"  onclick="deleteStudent(${s.id}, '${s.name}')">🗑 Delete</button>
          </div></td>
        </tr>`;
      }).join('');
    }

    // ── SEARCH ───────────────────────────────────────────────────────────────────
    function filterTable(q) {
      const filtered = allStudents.filter(s =>
        s.name.toLowerCase().includes(q.toLowerCase()) ||
        s.course.toLowerCase().includes(q.toLowerCase())
      );
      renderTable(filtered);
    }

    // ── SUBMIT (ADD / UPDATE) ────────────────────────────────────────────────────
    async function submitForm() {
      const name   = document.getElementById('f-name').value.trim();
      const email  = document.getElementById('f-email').value.trim();
      const course = document.getElementById('f-course').value;
      const age    = document.getElementById('f-age').value;
      if (!name || !email || !course || !age) { showToast('⚠️ All fields are required', 'error'); return; }

      const body = { name, email, course, age: parseInt(age) };
      const isEdit = editingId !== null;
      const url    = isEdit ? `${API}/students/${editingId}` : `${API}/students`;
      const method = isEdit ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        showToast(isEdit ? '✅ Student updated!' : '✅ Student added!', 'success');
        resetForm();
        loadStudents();
      } catch (e) {
        showToast(`❌ ${e.message}`, 'error');
      }
    }

    // ── EDIT ─────────────────────────────────────────────────────────────────────
    async function editStudent(id) {
      const s = allStudents.find(x => x.id === id);
      if (!s) return;
      editingId = id;
      document.getElementById('f-name').value   = s.name;
      document.getElementById('f-email').value  = s.email;
      document.getElementById('f-course').value = s.course;
      document.getElementById('f-age').value    = s.age;
      document.getElementById('form-title').textContent = 'Edit Student';
      document.getElementById('btn-label').textContent  = '💾 Update Student';
      document.getElementById('edit-id-display').style.display = 'block';
      document.getElementById('edit-id-display').textContent = `Editing ID #${id}`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── DELETE ───────────────────────────────────────────────────────────────────
    async function deleteStudent(id, name) {
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
      try {
        const res = await fetch(`${API}/students/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');
        showToast(`🗑 "${name}" removed`, 'success');
        loadStudents();
      } catch (e) {
        showToast(`❌ ${e.message}`, 'error');
      }
    }

    // ── RESET FORM ───────────────────────────────────────────────────────────────
    function resetForm() {
      ['f-name','f-email','f-age'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-course').value = '';
      editingId = null;
      document.getElementById('form-title').textContent = 'Add New Student';
      document.getElementById('btn-label').textContent  = '➕ Add Student';
      document.getElementById('edit-id-display').style.display = 'none';
    }

    // ── TOAST ────────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = ''; }, 3500);
    }

    // ── INIT ─────────────────────────────────────────────────────────────────────
    loadStudents();
  </script>
</body>
</html>
