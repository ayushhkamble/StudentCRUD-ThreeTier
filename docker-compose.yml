version: '3.8'

services:

  # ── TIER 1: MySQL Database ──────────────────────────────────────
  database:
    image: mysql:8.0
    container_name: studentcrud-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: studentdb
      MYSQL_USER: cruduser
      MYSQL_PASSWORD: crudpass
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── TIER 2: Node.js Backend API ─────────────────────────────────
  backend:
    build: ./backend
    container_name: studentcrud-backend
    restart: unless-stopped
    environment:
      DB_HOST: database
      DB_USER: cruduser
      DB_PASSWORD: crudpass
      DB_NAME: studentdb
      DB_PORT: 3306
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app-network

  # ── TIER 3: Nginx Frontend ──────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: studentcrud-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/studentcrud.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
